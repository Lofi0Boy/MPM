  function disposeCachedTerm(project) {
    const entry = termCache[project];
    if (!entry) return;
    if (entry.ws) entry.ws.close();
    if (entry.resizeObs) entry.resizeObs.disconnect();
    entry.term.dispose();
    if (entry.slot) entry.slot.remove();
    else entry.container.remove();
    delete termCache[project];
  }

  // Single source of truth: which project's terminal currently has focus
  let focusedProject = null;

  function setFocusedProject(project) {
    focusedProject = project;
    updateTermDimming();
  }

  function updateTermDimming() {
    // Show dimming when any terminal is active (panel or popout)
    const panelOpen = termProject && termPanel.classList.contains('open');
    const hasActive = panelOpen || focusedProject;
    const activeProject = focusedProject || termProject;
    boardWrapper.classList.toggle('term-dimmed', !!hasActive);
    document.querySelectorAll('.col').forEach(col => {
      col.classList.toggle('term-active', !!hasActive && col.dataset.project === activeProject);
    });
  }

  function openPopOut(project) {
    // Use saved geometry or defaults
    const geoStr = localStorage.getItem('termPopGeo_' + project);
    let w = Math.round(screen.width * 0.7);
    let h = Math.round(screen.height * 0.7);
    let left = Math.round((screen.width - w) / 2);
    let top = Math.round((screen.height - h) / 2);
    if (geoStr) {
      try {
        const geo = JSON.parse(geoStr);
        w = geo.w ?? w; h = geo.h ?? h; left = geo.x ?? left; top = geo.y ?? top;
      } catch(e) {}
    }
    const win = window.open(
      `/terminal/${encodeURIComponent(project)}`,
      `ttyd-${project}`,
      `width=${w},height=${h},left=${left},top=${top}`
    );
    if (win) {
      activePopouts.add(project);
      disposeCachedTerm(project);
    } else {
      // Popup blocked by browser
      const msg = document.getElementById('status');
      if (msg) {
        const prev = msg.textContent;
        msg.textContent = 'Popup blocked — allow popups for this site';
        msg.style.color = '#e74c3c';
        setTimeout(() => { msg.textContent = prev; msg.style.color = ''; }, 4000);
      }
    }
  }

  function popOutTerminal() {
    if (!termProject) return;
    const project = termProject;
    closeTerminal();
    openPopOut(project);
  }

  // Listen for messages from popup windows via BroadcastChannel
  const termChannel = new BroadcastChannel('mpm-terminal');
  termChannel.onmessage = e => {
    const d = e.data;
    if (!d || !d.type) return;
    if (d.type === 'mpm-popout-register') {
      activePopouts.add(d.project);
    }
    if (d.type === 'mpm-focus') {
      setFocusedProject(d.project);
    }
    if (d.type === 'mpm-popout-closed') {
      activePopouts.delete(d.project);
      // termPopOut_ flag stays — next open will reopen as popout
      if (focusedProject === d.project) setFocusedProject(null);
    }
    if (d.type === 'mpm-dock') {
      activePopouts.delete(d.project);
      const session = sessionsData.find(s => s.project === d.project);
      if (session && session.ttyd_port) {
        showTerminal(d.project, session.ttyd_port);
      }
    }
    if (d.type === 'mpm-cycle-session') {
      const runningSessions = sessionsData.filter(s => s.state === 'running' || s.state === 'idle');
      if (runningSessions.length === 0) return;
      const currentIdx = runningSessions.findIndex(s => s.project === d.from);
      const nextIdx = (currentIdx + 1) % runningSessions.length;
      openTerminal(runningSessions[nextIdx].project);
    }
    if (d.type === 'mpm-start-cli') {
      openCliDialog(d.project);
    }
    if (d.type === 'mpm-add-note') {
      addNote();
    }
  };

  function closeTerminal() {
    if (termProject && termCache[termProject]) {
      termCache[termProject].slot.style.display = 'none';
    }
    termPanel.classList.remove('open');
    document.body.classList.remove('term-open');
    if (focusedProject === termProject) focusedProject = null;
    termProject = null;
    updateTermDimming();
    requestAnimationFrame(fixStreamlines);
  }

  async function killSession(project) {
    try {
      await api(`/api/sessions/${encodeURIComponent(project)}`, { method: 'DELETE' });
      // Clear border effect immediately
      applyAgentStatus(project, 'offline');
      const cache = JSON.parse(localStorage.getItem('agentStatus') || '{}');
      delete cache[project];
      localStorage.setItem('agentStatus', JSON.stringify(cache));
      if (termProject === project) {
        closeTerminal();
      }
      disposeCachedTerm(project);
      loadSessions();
    } catch(e) { /* silent */ }
  }

  function killCurrentSession() {
    if (termProject) killSession(termProject);
  }

  function startCliForSlot(project) {
    openCliDialog(project);
  }

  function killSlotSession(project) {
    killSession(project);
  }

  function onTermCardClick(e, project, el) {
    e.stopPropagation();
    const session = sessionsData.find(s => s.project === project);
    // If running/idle and clicked the stop icon
    const actionEl = el.querySelector('[data-term-action]');
    if (actionEl && e.target === actionEl && session && session.state !== 'off') {
      killSession(project);
      return;
    }
    openTerminal(project, el);
  }

  function onTermStopClick(project) {
    const session = sessionsData.find(s => s.project === project);
    if (session && session.state !== 'off') {
      killSession(project);
    }
  }

  // ---- Terminal panel resize + mode toggle ----
  let termMode = localStorage.getItem('termMode') || 'bottom';

  function applyTermMode() {
    termPanel.style.width = '';
    termPanel.style.height = '';
    if (termMode === 'right') {
      termPanel.classList.add('mode-right');
      document.body.classList.add('term-right');
      const savedW = localStorage.getItem('termW') || '45vw';
      document.body.style.setProperty('--term-w', savedW);
      document.body.style.removeProperty('--term-h');
      if (savedW.endsWith('px')) { termPanel.style.width = savedW; }
    } else {
      termPanel.classList.remove('mode-right');
      document.body.classList.remove('term-right');
      const savedH = localStorage.getItem('termH') || '40vh';
      document.body.style.setProperty('--term-h', savedH);
      document.body.style.removeProperty('--term-w');
      if (savedH.endsWith('px')) { termPanel.style.height = savedH; }
    }
  }

  // Apply saved mode on load (disable transition to prevent flash)
  termPanel.style.transition = 'none';
  applyTermMode();
  // Force reflow, then re-enable transition
  termPanel.offsetHeight;
  termPanel.style.transition = '';

  function toggleTermMode() {
    termMode = termMode === 'bottom' ? 'right' : 'bottom';
    localStorage.setItem('termMode', termMode);
    applyTermMode();
  }

  // Drag resize handle
  const resizeHandle = document.getElementById('term-resize-handle');
  resizeHandle.addEventListener('mousedown', e => {
    e.preventDefault();
    const isRight = termMode === 'right';

    // Block iframe from stealing mouse events during drag
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:' + (isRight ? 'ew-resize' : 'ns-resize');
    document.body.appendChild(overlay);

    function onMove(ev) {
      if (isRight) {
        const w = window.innerWidth - ev.clientX;
        const clamped = Math.max(200, Math.min(w, window.innerWidth - 200));
        termPanel.style.width = clamped + 'px';
        document.body.style.setProperty('--term-w', clamped + 'px');
      } else {
        const h = window.innerHeight - ev.clientY;
        const clamped = Math.max(120, Math.min(h, window.innerHeight - 100));
        termPanel.style.height = clamped + 'px';
        document.body.style.setProperty('--term-h', clamped + 'px');
      }
    }

    function onUp() {
      overlay.remove();
      // Save size to localStorage
      if (isRight) {
        localStorage.setItem('termW', termPanel.style.width || '45vw');
      } else {
        localStorage.setItem('termH', termPanel.style.height || '40vh');
      }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.removeProperty('user-select');
    }

    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });


  // ---- CLI start dialog ----
  let savedCliCommands = [];
  let cliDialogProject = null;

  async function loadCliCommands() {
    try {
      savedCliCommands = await api('/api/cli-commands');
    } catch(e) { /* silent */ }
  }

  function openCliDialog(project, anchorEl) {
    cliDialogProject = project;
    document.getElementById('cli-dialog-project').textContent = project;
    renderCliList();
    const overlay = document.getElementById('cli-dialog');
    const dialog = overlay.querySelector('.cli-dialog');
    overlay.classList.remove('hidden');

    // Position near the anchor button
    if (anchorEl) {
      const rect = anchorEl.getBoundingClientRect();
      let top = rect.bottom + 6;
      let left = rect.left;
      // Keep within viewport
      if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
      if (top + 300 > window.innerHeight) top = rect.top - 306;
      dialog.style.top = top + 'px';
      dialog.style.left = left + 'px';
    }

    document.getElementById('cli-custom-input').value = '';
    setTimeout(() => document.getElementById('cli-custom-input').focus(), 50);
  }

  function closeCliDialog() {
    document.getElementById('cli-dialog').classList.add('hidden');
    cliDialogProject = null;
  }

  function renderCliList() {
    const list = document.getElementById('cli-dialog-list');
    list.innerHTML = savedCliCommands.map(cmd =>
      `<div class="cli-cmd-row">
        <button class="cli-cmd-item" onclick="startCliWith('${esc(cmd)}')">${esc(cmd)}</button>
        <button class="cli-cmd-del" onclick="event.stopPropagation();deleteCliCommand('${esc(cmd)}')" title="Remove">&times;</button>
      </div>`
    ).join('');
  }

  async function deleteCliCommand(cmd) {
    try {
      savedCliCommands = await api('/api/cli-commands', { method: 'DELETE', body: { command: cmd } });
      renderCliList();
    } catch(e) { /* silent */ }
  }

  async function startCliWith(cmd) {
    if (!cliDialogProject) return;
    const project = cliDialogProject;
    closeCliDialog();
    try {
      await api('/api/sessions', { method: 'POST', body: { project, cli_command: cmd } });
      await loadSessions();
      openTerminal(project);
    } catch(e) { /* silent */ }
  }

  function startCliCustom() {
    const input = document.getElementById('cli-custom-input');
    const cmd = input.value.trim();
    if (cmd) startCliWith(cmd);
  }

  async function addCliCommand() {
    const input = document.getElementById('cli-custom-input');
    const cmd = input.value.trim();
    if (!cmd) return;
    try {
      savedCliCommands = await api('/api/cli-commands', { method: 'POST', body: { command: cmd } });
      renderCliList();
      input.value = '';
    } catch(e) { /* silent */ }
  }

  // CLI dialog keyboard navigation
  let cliActiveIdx = -1;

  document.getElementById('cli-custom-input').addEventListener('keydown', e => {
    const items = document.querySelectorAll('#cli-dialog-list .cli-cmd-item');
    if (e.key === 'Enter') {
      e.preventDefault();
      if (cliActiveIdx >= 0 && cliActiveIdx < items.length) {
        items[cliActiveIdx].click();
      } else {
        startCliCustom();
      }
      return;
    }
    if (e.key === 'Escape') {
      e.preventDefault();
      closeCliDialog();
      return;
    }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      items.forEach(i => i.classList.remove('cli-active'));
      if (e.key === 'ArrowDown') {
        cliActiveIdx = cliActiveIdx < items.length - 1 ? cliActiveIdx + 1 : 0;
      } else {
        cliActiveIdx = cliActiveIdx > 0 ? cliActiveIdx - 1 : items.length - 1;
      }
      if (items[cliActiveIdx]) {
        items[cliActiveIdx].classList.add('cli-active');
        items[cliActiveIdx].scrollIntoView({ block: 'nearest' });
      }
    }
  });

  // Reset active index when dialog opens
  const _origOpenCli = openCliDialog;
  openCliDialog = function(project, anchorEl) {
    cliActiveIdx = -1;
    _origOpenCli(project, anchorEl);
  };

  function startCli() {
    if (!termProject) return;
    openCliDialog(termProject, document.getElementById('term-start-btn'));
  }

  // ---- Session status polling ----
  async function loadSessions() {
    try {
      sessionsData = await api('/api/sessions');
      updateStatusDots();
      updateTermStatus();
    } catch(e) { /* silent */ }
  }

  function updateStatusDots() {
    document.querySelectorAll('[data-status-project]').forEach(dot => {
      const project = dot.dataset.statusProject;
      const session = sessionsData.find(s => s.project === project);
      const state = session ? session.state : 'off';
      dot.className = `status-dot ${state}`;
    });
    // Auto-clear border effect for dead sessions
    const agentCache = JSON.parse(localStorage.getItem('agentStatus') || '{}');
    let agentCacheChanged = false;
    Object.keys(agentCache).forEach(proj => {
      const sess = sessionsData.find(s => s.project === proj);
      if (!sess || sess.state === 'off') {
        applyAgentStatus(proj, 'offline');
        delete agentCache[proj];
        agentCacheChanged = true;
      }
    });
    if (agentCacheChanged) localStorage.setItem('agentStatus', JSON.stringify(agentCache));
    // Update idle card labels based on session alive/off
    document.querySelectorAll('.current-task-card.task-idle[data-term-project]').forEach(card => {
      const project = card.dataset.termProject;
      const session = sessionsData.find(s => s.project === project);
      const alive = session && session.state !== 'off';
      const label = card.querySelector('.ct-idle-label');
      if (label) label.textContent = alive ? 'Chatting away...' : 'Start Session';
    });
    // Update terminal card borders and labels (skip current-task-cards and term-slots)
    document.querySelectorAll('[data-term-project]').forEach(card => {
      if (card.classList.contains('current-task-card')) return;
      if (card.dataset.termSlot) return;
      const project = card.dataset.termProject;
      const session = sessionsData.find(s => s.project === project);
      const state = session ? session.state : 'off';
      card.className = `card term-card s-${state}`;
      const label = card.querySelector('.term-card-label');
      if (label) {
        if (state === 'running' && session.cli_name) {
          label.innerHTML = `<span class="cli-name">${esc(session.cli_name)}</span> running`;
        } else if (state === 'idle') {
          label.textContent = 'Session idle';
        } else {
          label.textContent = 'Terminal';
        }
      }
      const action = card.querySelector('.term-card-action');
      if (action) {
        action.textContent = state === 'off' ? '\u25b6' : '\u25a0';
      }
    });
  }

  function updateTermStatus() {
    if (!termProject) return;
    const session = sessionsData.find(s => s.project === termProject);
    const state = session ? session.state : 'off';
    termStatusDot.className = `status-dot ${state}`;
    const labels = { off: 'No session', idle: 'Idle', running: '' };
    termStatusText.textContent = state === 'running' && session.cli_name
      ? `${session.cli_name} running`
      : (labels[state] || '');
    if (termProject === '_mpm-init') {
      termStartBtn.style.display = 'none';
      document.getElementById('term-kill-btn').style.display = '';
    } else {
      termStartBtn.style.display = state === 'off' ? '' : 'none';
      document.getElementById('term-kill-btn').style.display = state === 'off' ? 'none' : '';
    }
    // Update slot sub-headers
    updateSlotStatus(termProject);
  }

  function updateSlotStatus(project) {
    const session = sessionsData.find(s => s.project === project);
    const state = session ? session.state : 'off';
    const statusEl = document.querySelector(`[data-slot-status="${project}"]`);
    if (statusEl) {
      const labels = { off: 'No session', idle: 'Idle', running: '' };
      statusEl.textContent = state === 'running' && session?.cli_name
        ? `${session.cli_name} running`
        : (labels[state] || '');
    }
    const startBtn = document.querySelector(`[data-slot-start="${project}"]`);
    const killBtn = document.querySelector(`[data-slot-kill="${project}"]`);
    if (startBtn) startBtn.style.display = state === 'off' ? '' : 'none';
    if (killBtn) killBtn.style.display = state === 'off' ? 'none' : '';
  }

  // ---- File change detection (inotify via server) ----
  socket.on('project_changed', (data) => {
    if (data.project) loadProject(data.project);
  });

  // ---- Agent status updates from hooks ----
  function applyAgentStatus(project, status) {
    const selector = project
      ? `.col[data-project="${project}"] .current-task-card`
      : '.current-task-card';
    document.querySelectorAll(selector).forEach(card => {
      card.classList.remove('task-working', 'task-waiting');
      if (status === 'working') card.classList.add('task-working');
      else if (status === 'waiting') card.classList.add('task-waiting');
    });
  }

  socket.on('agent_status', (data) => {
    // Save to localStorage
    if (data.project) {
      const cache = JSON.parse(localStorage.getItem('agentStatus') || '{}');
      cache[data.project] = data.status;
      localStorage.setItem('agentStatus', JSON.stringify(cache));
    }
    applyAgentStatus(data.project, data.status);
  });

  // Restore from localStorage after render
  function restoreAgentStatus() {
    const cache = JSON.parse(localStorage.getItem('agentStatus') || '{}');
    Object.entries(cache).forEach(([project, status]) => applyAgentStatus(project, status));
  }

  // ---- Autonext glow ----
  async function updateAutonextGlow() {
    // Remove all existing glow
    document.querySelectorAll('.autonext-active').forEach(el => el.classList.remove('autonext-active'));
    try {
      const state = await api('/api/autonext-state');
      if (!state || !state.queue) return;
      // Apply glow to current task card in the project
      const col = document.querySelector(`.col[data-project="${state.project}"]`);
      if (!col) return;
      // Current task — force green pulse during autonext
      const currentCard = col.querySelector('.current-task-card:not(.task-idle)');
      if (currentCard) {
        currentCard.classList.remove('task-waiting');
        currentCard.classList.add('task-working');
      }
      // Apply glow to future cards in the queue
      const queueSet = new Set(state.queue);
      col.querySelectorAll('.nt-card').forEach(card => {
        if (queueSet.has(card.dataset.ntId)) {
          card.classList.add('autonext-active');
        }
      });
    } catch(e) { /* silent */ }
  }

  // ---- Shortcut system ----
  const SHORTCUT_DEFAULTS = {
    'addNote':       { label: 'Add Note',           key: 'ctrl+KeyM' },
    'addTask':       { label: 'Add Task',           key: 'ctrl+KeyE' },
    'cycleProject':  { label: 'Cycle Projects',     key: 'shift+Space' },
    'openTerminal':  { label: 'Terminal / Session', key: 'shift+KeyS' },
    'closeTerminal': { label: 'Close Terminal',     key: 'chord:Space+Escape' },
  };

  let shortcutBindings = {};

  function loadShortcuts() {
    try {
      const saved = JSON.parse(localStorage.getItem('mpmShortcuts') || '{}');
      shortcutBindings = {};
      for (const [id, def] of Object.entries(SHORTCUT_DEFAULTS)) {
        shortcutBindings[id] = saved[id] || def.key;
      }
    } catch(e) {
      shortcutBindings = Object.fromEntries(
        Object.entries(SHORTCUT_DEFAULTS).map(([id, def]) => [id, def.key])
      );
    }
  }
  loadShortcuts();

  function saveShortcuts() {
    localStorage.setItem('mpmShortcuts', JSON.stringify(shortcutBindings));
  }

  function matchesShortcut(e, bindingKey) {
    if (!bindingKey || bindingKey.startsWith('chord:')) return false;
    const parts = bindingKey.split('+');
    const code = parts.pop();
    const needCtrl = parts.includes('ctrl');
    const needShift = parts.includes('shift');
    const needAlt = parts.includes('alt');
    return e.code === code && e.ctrlKey === needCtrl && e.shiftKey === needShift && e.altKey === needAlt;
  }

  function keyLabel(bindingKey) {
    if (!bindingKey) return '—';
    if (bindingKey.startsWith('chord:')) {
      return bindingKey.replace('chord:', '').split('+').map(k => k.replace('Key', '')).join(' → ');
    }
    return bindingKey.split('+').map(p => {
      if (p === 'ctrl') return 'Ctrl';
      if (p === 'shift') return 'Shift';
      if (p === 'alt') return 'Alt';
      if (p === 'Space') return 'Space';
      if (p === 'Escape') return 'Esc';
      return p.replace('Key', '');
    }).join('+');
  }

  function toggleShortcutPanel() {
    const panel = document.getElementById('shortcut-panel');
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) {
      renderShortcutList();
      // Position below the Shortcuts button
      const btn = document.querySelector('[onclick*="toggleShortcutPanel"]');
      if (btn) {
        const rect = btn.getBoundingClientRect();
        panel.style.top = (rect.bottom + 4) + 'px';
        panel.style.left = Math.max(4, rect.left - 200) + 'px';
      }
    }
  }

  // Close panel on outside click + unfocus project on outside click
  document.addEventListener('click', e => {
    const panel = document.getElementById('shortcut-panel');
    if (!panel.classList.contains('hidden')) {
      if (!panel.contains(e.target) && !e.target.closest('[onclick*="toggleShortcutPanel"]')) {
        panel.classList.add('hidden');
      }
    }
    // Unfocus project when clicking outside columns
    if (focusedProject && !e.target.closest('.col') && !e.target.closest('.term-panel') && !e.target.closest('.shortcut-panel')) {
      setFocusedProject(null);
    }
  });

  function renderShortcutList() {
    const list = document.getElementById('shortcut-list');
    list.innerHTML = Object.entries(SHORTCUT_DEFAULTS).map(([id, def]) => {
      const current = shortcutBindings[id] || def.key;
      const isChord = current.startsWith('chord:');
      return `<div class="shortcut-row">
        <span class="shortcut-label">${def.label}</span>
        <input class="shortcut-key" value="${keyLabel(current)}" data-shortcut-id="${id}"
          ${isChord ? 'readonly title="Chord shortcuts cannot be rebound"' : 'readonly'}
          onfocus="startRecording(this)" onblur="stopRecording(this)" />
        <button class="shortcut-reset" onclick="resetShortcut('${id}')" title="Reset">↩</button>
      </div>`;
    }).join('');
  }

  let recordingEl = null;
  function startRecording(el) {
    if (el.dataset.shortcutId === 'closeTerminal') return; // chord, not rebindable
    el.classList.add('recording');
    el.value = 'Press key...';
    recordingEl = el;
  }
  function stopRecording(el) {
    el.classList.remove('recording');
    recordingEl = null;
    const id = el.dataset.shortcutId;
    el.value = keyLabel(shortcutBindings[id]);
  }

  document.addEventListener('keydown', e => {
    if (!recordingEl) return;
    e.preventDefault();
    e.stopPropagation();
    // Ignore lone modifier keys
    if (['Shift', 'Control', 'Alt', 'Meta'].includes(e.key)) return;
    const parts = [];
    if (e.ctrlKey) parts.push('ctrl');
    if (e.shiftKey) parts.push('shift');
    if (e.altKey) parts.push('alt');
    parts.push(e.code);
    const binding = parts.join('+');
    const id = recordingEl.dataset.shortcutId;
    shortcutBindings[id] = binding;
    saveShortcuts();
    recordingEl.value = keyLabel(binding);
    recordingEl.classList.remove('recording');
    recordingEl.blur();
    recordingEl = null;
  }, true); // capture phase to intercept before other handlers

  function resetShortcut(id) {
    shortcutBindings[id] = SHORTCUT_DEFAULTS[id].key;
    saveShortcuts();
    renderShortcutList();
  }

  // ---- Init ----
  load();
  loadNotes();
  loadSessions();
  loadCliCommands();
  setInterval(loadSessions, 5_000);
  setInterval(updateAutonextGlow, 5_000);
  setTimeout(updateAutonextGlow, 2000);

  // Ask existing popout windows to re-register (in case main page was refreshed)
  termChannel.postMessage({ type: 'mpm-ping' });
</script>
</body>
</html>
